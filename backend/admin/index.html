<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a1f36;
            --secondary: #4f6df5;
            --accent: #00d4aa;
            --bg: #f4f7fe;
            --surface: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
            --danger: #e53e3e;
            --success: #38a169;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* ─── LOGIN SCREEN ─── */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .login-box h2 {
            color: white;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 170, 0.2);
        }

        .error-msg {
            color: #ff8a8a;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
        }

        /* ─── DASHBOARD LAYOUT ─── */
        #app {
            display: none;
            width: 100%;
        }

        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            color: var(--primary);
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-menu {
            list-style: none;
            padding: 20px 0;
            flex: 1;
            overflow-y: auto;
        }

        .nav-item {
            padding: 0 16px;
            margin-bottom: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-light);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: white;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--danger);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
            max-width: 1200px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .top-bar h1 {
            color: var(--primary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* ─── CARDS & FORMS ─── */
        .card {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 1.2rem;
            color: var(--primary);
            font-weight: 600;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .input-control:focus {
            border-color: var(--secondary);
        }

        textarea.input-control {
            min-height: 100px;
            resize: vertical;
        }

        .btn-save {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-save:hover {
            background: var(--primary);
        }

        /* ─── TOAST NOTIFICATION ─── */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .section-view {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .section-view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Project List */
        .project-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            background: #fafafa;
        }
        .project-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            color: var(--text-light);
        }
        .project-actions button:hover {
            color: var(--secondary);
        }
    </style>
</head>
<body>

    <!-- ─── LOGIN SCREEN ─── -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Admin Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
                <div class="error-msg" id="login-error">Invalid credentials</div>
            </form>
        </div>
    </div>

    <!-- ─── DASHBOARD ─── -->
    <div id="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-layer-group"></i> Portfolio</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a class="nav-link active" data-target="hero-section"><i class="fas fa-home"></i> Hero Section</a></li>
                <li class="nav-item"><a class="nav-link" data-target="about-section"><i class="fas fa-user"></i> About</a></li>
                <li class="nav-item"><a class="nav-link" data-target="projects-section"><i class="fas fa-rocket"></i> Projects</a></li>
                <li class="nav-item"><a class="nav-link" data-target="files-section"><i class="fas fa-file-upload"></i> Files & CV</a></li>
            </ul>
            <div class="sidebar-footer">
                <a class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 id="page-title">Dashboard</h1>
                <div class="user-info">
                    <span id="admin-name">Admin</span>
                    <div style="width: 40px; height: 40px; background: var(--secondary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">A</div>
                </div>
            </div>

            <!-- Hero Editor -->
            <div id="hero-section" class="section-view active">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Hero Details</h3>
                    </div>
                    <form id="hero-form">
                        <div class="form-grid">
                            <div class="input-group">
                                <label>Name</label>
                                <input type="text" id="hero-name" class="input-control">
                            </div>
                            <div class="input-group">
                                <label>Tagline</label>
                                <input type="text" id="hero-tagline" class="input-control">
                            </div>
                            <div class="input-group" style="grid-column: span 2;">
                                <label>Subtitle</label>
                                <input type="text" id="hero-subtitle" class="input-control">
                            </div>
                            <div class="input-group" style="grid-column: span 2;">
                                <label>Description</label>
                                <textarea id="hero-description" class="input-control"></textarea>
                            </div>
                        </div>
                        <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
                            <button type="submit" class="btn-save"><i class="fas fa-save"></i> Save Hero</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- About Editor -->
            <div id="about-section" class="section-view">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">About Me</h3>
                    </div>
                    <form id="about-form">
                        <div class="input-group">
                            <label>Paragraph 1</label>
                            <textarea id="about-p1" class="input-control"></textarea>
                        </div>
                        <div class="input-group">
                            <label>Paragraph 2</label>
                            <textarea id="about-p2" class="input-control"></textarea>
                        </div>
                        <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
                            <button type="submit" class="btn-save"><i class="fas fa-save"></i> Save About</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Projects Editor -->
            <div id="projects-section" class="section-view">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Manage Projects</h3>
                        <button class="btn-save" style="background: var(--accent); color: var(--primary);" id="add-project-btn"><i class="fas fa-plus"></i> Add New</button>
                    </div>
                    <div id="projects-list">
                        <!-- Populated by JS -->
                        <p style="color: var(--text-light); text-align: center; padding: 20px;">Loading projects...</p>
                    </div>
                </div>
            </div>

            <!-- Files Editor -->
            <div id="files-section" class="section-view">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Upload Files</h3>
                    </div>
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Upload CV (PDF)</label>
                            <input type="file" id="cv-upload" class="input-control" accept=".pdf">
                            <button onclick="uploadFile('cv-upload', 'CV')" class="btn-save" style="margin-top: 10px; width: 100%; justify-content: center;">Upload CV</button>
                        </div>
                        <div class="input-group">
                            <label>Profile Image (JPG/PNG)</label>
                            <input type="file" id="img-upload" class="input-control" accept="image/*">
                            <button onclick="uploadFile('img-upload', 'image')" class="btn-save" style="margin-top: 10px; width: 100%; justify-content: center;">Upload Image</button>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-msg">Saved successfully!</span>
    </div>

    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('portfolio_token');
        let portfolioData = null;

        // Init
        if (token) {
            fetchDataAndInit();
        }

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    token = data.token;
                    localStorage.setItem('portfolio_token', token);
                    document.getElementById('admin-name').innerText = data.user.name;
                    fetchDataAndInit();
                } else {
                    document.getElementById('login-error').style.display = 'block';
                    document.getElementById('login-error').innerText = data.message;
                }
            } catch (err) {
                console.error(err);
            } finally {
                btn.innerHTML = 'Sign In';
            }
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('portfolio_token');
            location.reload();
        });

        // Fetch Data
        async function fetchDataAndInit() {
            try {
                const res = await fetch(`${API_URL}/portfolio`);
                const data = await res.json();
                
                if (data.success) {
                    portfolioData = data.data;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    populateForms();
                } else {
                    localStorage.removeItem('portfolio_token');
                }
            } catch (err) {
                console.error('Error fetching data', err);
            }
        }

        // Populate Forms
        function populateForms() {
            if (!portfolioData) return;
            
            // Hero
            document.getElementById('hero-name').value = portfolioData.hero.name || '';
            document.getElementById('hero-tagline').value = portfolioData.hero.tagline || '';
            document.getElementById('hero-subtitle').value = portfolioData.hero.subtitle || '';
            document.getElementById('hero-description').value = portfolioData.hero.description || '';

            // About
            if (portfolioData.about.paragraphs && portfolioData.about.paragraphs.length > 0) {
                document.getElementById('about-p1').value = portfolioData.about.paragraphs[0] || '';
                document.getElementById('about-p2').value = portfolioData.about.paragraphs[1] || '';
            }

            // Projects
            renderProjects();
        }

        function renderProjects() {
            const list = document.getElementById('projects-list');
            if (!portfolioData.projects || portfolioData.projects.length === 0) {
                list.innerHTML = '<p>No projects found.</p>';
                return;
            }

            list.innerHTML = portfolioData.projects.map((p, i) => `
                <div class="project-list-item">
                    <div>
                        <strong>${p.title}</strong>
                        <div style="font-size: 0.85rem; color: var(--text-light); margin-top: 5px;">${p.description.substring(0,60)}...</div>
                    </div>
                    <div class="project-actions">
                        <button title="Edit" onclick="alert('Full project editing available in API')"><i class="fas fa-edit"></i></button>
                        <button title="Delete" style="color: var(--danger);" onclick="deleteProject(${i})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // Navigation
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                e.target.closest('.nav-link').classList.add('active');
                
                document.querySelectorAll('.section-view').forEach(s => s.classList.remove('active'));
                const target = e.target.closest('.nav-link').getAttribute('data-target');
                document.getElementById(target).classList.add('active');
                
                document.getElementById('page-title').innerText = e.target.closest('.nav-link').innerText;
            });
        });

        // Save Hero
        document.getElementById('hero-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('hero-name').value,
                tagline: document.getElementById('hero-tagline').value,
                subtitle: document.getElementById('hero-subtitle').value,
                description: document.getElementById('hero-description').value
            };

            await updateSection('/hero', payload);
        });

        // Save About
        document.getElementById('about-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                paragraphs: [
                    document.getElementById('about-p1').value,
                    document.getElementById('about-p2').value
                ]
            };
            await updateSection('/about', payload);
        });

        // Delete Project
        async function deleteProject(index) {
            if(confirm('Are you sure you want to delete this project?')) {
                try {
                    const res = await fetch(`${API_URL}/portfolio/projects/${index}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if(data.success) {
                        showToast('Project deleted');
                        fetchDataAndInit();
                    }
                } catch(err) {
                    console.error(err);
                }
            }
        }

        // Helper: API Update
        async function updateSection(endpoint, payload) {
            try {
                const res = await fetch(`${API_URL}/portfolio${endpoint}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('Saved successfully!');
                    portfolioData[endpoint.replace('/','')] = { ...portfolioData[endpoint.replace('/','')], ...payload };
                }
            } catch (err) {
                console.error(err);
                alert('Error saving data');
            }
        }

        // Upload File
        async function uploadFile(inputId, customName) {
            const input = document.getElementById(inputId);
            if (!input.files[0]) {
                alert('Please select a file first.');
                return;
            }

            const formData = new FormData();
            formData.append('file', input.files[0]);
            formData.append('customName', customName);

            try {
                const res = await fetch(`${API_URL}/files/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('File uploaded successfully!');
                    input.value = ''; // clear
                } else {
                    alert(data.message);
                }
            } catch (err) {
                console.error(err);
                alert('Error uploading file');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
